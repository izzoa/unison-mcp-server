id: gallery-api-lookup-before
title: ~/myapp — claude code
description: |
  Without Unison: Claude answers from training data, suggests an outdated
  prompt-caching API shape with a stale model ID. The cache_control
  parameter is shown on the request object (the old way) and the model
  alias predates the current Claude family.
