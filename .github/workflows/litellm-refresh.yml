name: Weekly LiteLLM Model Refresh

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run refresh script
        id: refresh
        run: |
          python scripts/refresh_litellm_models.py \
            --output-summary /tmp/refresh-summary.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet conf/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PR
        if: steps.check.outputs.has_changes == 'true'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --head chore/litellm-model-refresh \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create or update branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B chore/litellm-model-refresh
          git add conf/*.json
          git commit -m "chore: weekly model catalog refresh"
          git push -f origin chore/litellm-model-refresh

      - name: Read summary
        if: steps.check.outputs.has_changes == 'true'
        id: summary
        run: |
          {
            echo "body<<SUMMARY_EOF"
            cat /tmp/refresh-summary.md
            echo ""
            echo "---"
            echo "_Auto-generated by the weekly LiteLLM model refresh workflow._"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.check.outputs.has_changes == 'true' && steps.existing_pr.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: weekly model catalog refresh" \
            --body "${{ steps.summary.outputs.body }}" \
            --head chore/litellm-model-refresh \
            --base main

      - name: Update existing PR
        if: steps.check.outputs.has_changes == 'true' && steps.existing_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ steps.existing_pr.outputs.pr_number }} \
            --body "${{ steps.summary.outputs.body }}"
